name: Deploy slides to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'slides/open-slide/**'
      - '.github/workflows/deploy-slides.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: slides/open-slide
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: slides/open-slide/package-lock.json
      - run: npm ci
      - run: npm run check
      - run: npm run build
      - name: Add SPA fallback and root redirect
        run: |
          cp dist/index.html dist/404.html
          node -e "
            const fs = require('fs');
            const html = fs.readFileSync('dist/index.html', 'utf8');
            const redirect = '<script>if(location.pathname===\"/mini-streamlit-demo/\"||location.pathname===\"/mini-streamlit-demo\"){location.replace(\"/mini-streamlit-demo/s/streamlit-workshop\");}</script>';
            fs.writeFileSync('dist/index.html', redirect + html);
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: slides/open-slide/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
